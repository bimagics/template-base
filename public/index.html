<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIZBI AI Agent</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>Gemini AI Agent</h1>
            <p>Powered by Vertex AI</p>
        </header>
        <main id="chat-messages" class="chat-messages"></main>
        <footer class="chat-input-area">
            <div id="loading-indicator" class="typing-indicator hidden">
                <span></span><span></span><span></span>
            </div>
            <form id="chat-form" class="chat-form">
                <textarea id="message-input" placeholder="Ask me anything..." required></textarea>
                <button type="submit" id="send-button" title="Send Message">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </form>
        </footer>
    </div>
    <script>
      window.API_BASE = window.API_BASE || '';
    </script>
    <script src="app.js"></script>
</body>
</html>
