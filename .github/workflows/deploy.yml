name: Deploy Project

on:
  push:
    branches: [ "dev", "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  GCP_REGION: ${{ secrets.GCP_REGION || 'europe-west1' }}
  AR_REPO: "wizbi"
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable Firebase Hosting API
        run: gcloud services enable firebasehosting.googleapis.com --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Configure Docker authentication
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Decide Target Service and Hosting Site
        id: target
        run: |
          if [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            echo "service_id=${{ github.event.repository.name }}-service-qa" >> $GITHUB_OUTPUT
            echo "hosting_site=${{ github.event.repository.name }}-qa" >> $GITHUB_OUTPUT
          else
            echo "service_id=${{ github.event.repository.name }}-service" >> $GITHUB_OUTPUT
            echo "hosting_site=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloud Run (private)
        run: |
          gcloud run deploy "${{ steps.target.outputs.service_id }}" \
            --image "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --region "${{ env.GCP_REGION }}" \
            --no-allow-unauthenticated \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"

      # --- THIS IS THE FIX: Added a robust retry loop ---
      - name: Grant Firebase Hosting Invoker Role (with Retry)
        run: |
          echo "Attempting to grant Cloud Run Invoker role to Firebase Hosting SA..."
          PROJECT_NUMBER=$(gcloud projects describe ${{ secrets.GCP_PROJECT_ID }} --format='value(projectNumber)')
          FIREBASE_SA="serviceAccount:service-${PROJECT_NUMBER}@gcp-sa-firebasehosting.iam.gserviceaccount.com"
          
          for i in {1..5}; do
            if gcloud run services add-iam-policy-binding "${{ steps.target.outputs.service_id }}" \
              --member="${FIREBASE_SA}" \
              --role="roles/run.invoker" \
              --region "${{ env.GCP_REGION }}" \
              --project "${{ secrets.GCP_PROJECT_ID }}"; then
              echo "✅ Permissions granted successfully on attempt $i."
              exit 0
            fi
            echo "Attempt $i failed. Service Account might not exist yet. Retrying in 15 seconds..."
            sleep 15
          done
          
          echo "::error::Failed to grant permissions after 5 attempts."
          exit 1

      - name: Patch firebase.json to target correct service
        run: |
          jq '(.hosting[] | select(.site == "${{ steps.target.outputs.hosting_site }}").rewrites[] | select(.source == "/api/**").run.serviceId) |= "${{ steps.target.outputs.service_id }}"' firebase.json > firebase.tmp.json && mv firebase.tmp.json firebase.json
          echo "Patched firebase.json:"
          cat firebase.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy \
            --only hosting:${{ steps.target.outputs.hosting_site }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --non-interactive
